<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Critical: viewport-fit=cover makes env(safe-area-inset-*) work on iOS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>Bocora – Travel Budget Tracker</title>
    <meta name="description" content="Track your travel expenses across currencies and countries." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2d2a26" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bocora" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Prevent phone number detection -->
    <meta name="format-detection" content="telephone=no" />

    <!-- AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6461845207268295"
      crossorigin="anonymous"></script>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/app/' })
            .catch(err => {
              console.warn('SW registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
